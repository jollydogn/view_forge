name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build, Pack & Publish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    - name: Restore dependencies
      run: dotnet restore src/ViewForge/ViewForge.csproj

    - name: Build
      run: dotnet build src/ViewForge/ViewForge.csproj --configuration Release --no-restore

    - name: Pack
      run: dotnet pack src/ViewForge/ViewForge.csproj --configuration Release --no-build --output ./nupkg

    - name: Push to NuGet
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
